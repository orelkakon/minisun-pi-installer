<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MinisunPi Installer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sun: #f59e0b;
      --sun-light: #fde68a;
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --ok: #10b981;
      --error: #ef4444;
      --running: #60a5fa;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 80px;
    }

    /* ── Logo ─────────────────────────────────────────────────────────────── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .sun-icon {
      width: 72px;
      height: 72px;
      animation: spin-slow 20s linear infinite;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .logo-wrap h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--sun), #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-wrap p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 480px;
    }

    .card + .card { margin-top: 20px; }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    /* ── Form ─────────────────────────────────────────────────────────────── */
    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: var(--sun); }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    button[type="submit"] {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: linear-gradient(135deg, var(--sun), #fb923c);
      color: #0f172a;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button[type="submit"]:hover  { opacity: 0.9; }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Log ──────────────────────────────────────────────────────────────── */
    #log-card { display: none; }

    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .step-item:last-child { border-bottom: none; }

    .step-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .step-body { flex: 1; min-width: 0; }

    .step-name {
      font-weight: 600;
      font-size: 0.92rem;
    }

    .step-output {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 4px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status-running .step-name { color: var(--running); }
    .status-ok      .step-name { color: var(--ok); }
    .status-error   .step-name { color: var(--error); }

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.7s linear infinite; }

    /* done banner */
    #done-banner {
      display: none;
      margin-top: 16px;
      background: rgba(16,185,129,0.12);
      border: 1px solid var(--ok);
      border-radius: 8px;
      padding: 14px 18px;
      text-align: center;
      color: var(--ok);
      font-weight: 600;
    }

    /* ── Footer ───────────────────────────────────────────────────────────── */
    footer {
      margin-top: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.8;
    }

    footer a {
      color: var(--sun);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 500;
    }

    footer a:hover { text-decoration: underline; }

    .li-icon {
      width: 16px;
      height: 16px;
      fill: var(--sun);
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <div class="logo-wrap">
    <svg class="sun-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Rays -->
      <g stroke="#f59e0b" stroke-width="5" stroke-linecap="round">
        <line x1="50" y1="5"  x2="50" y2="18"/>
        <line x1="50" y1="82" x2="50" y2="95"/>
        <line x1="5"  y1="50" x2="18" y2="50"/>
        <line x1="82" y1="50" x2="95" y2="50"/>
        <line x1="17" y1="17" x2="26" y2="26"/>
        <line x1="74" y1="74" x2="83" y2="83"/>
        <line x1="83" y1="17" x2="74" y2="26"/>
        <line x1="26" y1="74" x2="17" y2="83"/>
      </g>
      <!-- Core -->
      <circle cx="50" cy="50" r="22" fill="#f59e0b"/>
      <circle cx="50" cy="50" r="16" fill="#fde68a"/>
      <!-- Pi symbol -->
      <text x="50" y="56" text-anchor="middle" font-size="18" font-weight="bold"
            fill="#92400e" font-family="serif">π</text>
    </svg>

    <h1>MinisunPi Installer</h1>
    <p>Automated Raspberry Pi branch deployment</p>
  </div>

  <!-- Form card -->
  <div class="card">
    <h2>Connection Details</h2>
    <form id="install-form">
      <div class="row">
        <div class="field">
          <label>IP Address</label>
          <input type="text" id="ip" placeholder="192.168.1.50" required />
        </div>
        <div class="field" style="max-width:100px">
          <label>Port</label>
          <input type="number" id="port" value="22" required />
        </div>
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="user" placeholder="pi" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <div class="field">
        <label>Branch ID (BID)</label>
        <input type="text" id="bid" placeholder="e.g. 42" required />
      </div>
      <button type="submit" id="submit-btn">Install Now</button>
    </form>
  </div>

  <!-- Log card -->
  <div class="card" id="log-card">
    <h2>Installation Log</h2>
    <div id="log"></div>
    <div id="done-banner">✓ Installation complete!</div>
  </div>

  <!-- Footer -->
  <footer>
    <div>
      Made by
      <a href="https://linkedin.com/in/orelkakon" target="_blank" rel="noopener">
        Orel Kakon
        <svg class="li-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853
          0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9
          1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337
          7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063
          2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0
          .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24
          23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>
    </div>
    <div style="margin-top:4px">© 2026 MinisunPi Installer. All rights reserved.</div>
  </footer>

  <script>
    const form    = document.getElementById('install-form');
    const logCard = document.getElementById('log-card');
    const logEl   = document.getElementById('log');
    const doneEl  = document.getElementById('done-banner');
    const submitBtn = document.getElementById('submit-btn');

    // SVG icons
    const ICONS = {
      running: `<svg class="step-icon spinner" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>`,
      ok:      `<svg class="step-icon" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>`,
      error:   `<svg class="step-icon" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>`,
    };

    const stepEls = {};

    function upsertStep(data) {
      const { step, name, status, output } = data;
      const key = step;

      if (stepEls[key]) {
        const el = stepEls[key];
        el.className = `step-item status-${status}`;
        el.querySelector('.step-icon-wrap').innerHTML = ICONS[status] || '';
        el.querySelector('.step-name').textContent = name;
        if (output) el.querySelector('.step-output').textContent = output;
      } else {
        const el = document.createElement('div');
        el.className = `step-item status-${status}`;
        el.innerHTML = `
          <div class="step-icon-wrap">${ICONS[status] || ''}</div>
          <div class="step-body">
            <div class="step-name">${name}</div>
            <div class="step-output">${output || ''}</div>
          </div>`;
        logEl.appendChild(el);
        stepEls[key] = el;
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Installing…';
      logEl.innerHTML = '';
      doneEl.style.display = 'none';
      Object.keys(stepEls).forEach(k => delete stepEls[k]);
      logCard.style.display = 'block';

      const payload = {
        ip:       document.getElementById('ip').value.trim(),
        port:     parseInt(document.getElementById('port').value),
        user:     document.getElementById('user').value.trim(),
        password: document.getElementById('password').value,
        bid:      document.getElementById('bid').value.trim(),
      };

      try {
        const res = await fetch('/install', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          // Parse SSE lines
          const parts = buffer.split('\n\n');
          buffer = parts.pop(); // keep incomplete chunk

          for (const part of parts) {
            const line = part.split('\n').find(l => l.startsWith('data: '));
            if (!line) continue;
            const data = JSON.parse(line.slice(6));
            if (data.step === 99) {
              doneEl.style.display = 'block';
              doneEl.scrollIntoView({ behavior: 'smooth' });
            } else {
              upsertStep(data);
            }
          }
        }
      } catch (err) {
        upsertStep({ step: 0, name: 'Connection Error', status: 'error', output: err.message });
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Install Now';
      }
    });
  </script>
</body>
</html>
